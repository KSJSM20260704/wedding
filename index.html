<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조성민 & 김수정 결혼합니다</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4f4f4; color: #333; margin: 0; padding: 0; }
        .wrap { max-width: 480px; margin: 0 auto; background: white; padding-bottom: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { padding: 60px 20px; background-color: #fff9f9; }
        .header h1 { font-size: 26px; color: #d68585; margin-bottom: 15px; letter-spacing: 2px; }
        .header p { font-size: 16px; color: #888; }
        .photo { width: 100%; height: 400px; display: flex; align-items: center; justify-content: center; background-color: #eaeaea; color: #888; font-size: 14px; }
        .content { padding: 50px 20px; line-height: 2; font-size: 15px; }
        .date-location { margin-top: 20px; padding: 30px 20px; background-color: #fafafa; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .date-location p { margin: 8px 0; font-size: 18px; font-weight: bold; color: #444; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <h1>조성민 ❤️ 김수정</h1>
            <p>저희 결혼식에 초대합니다</p>
        </div>
        
        <div class="photo">
            여기에 두 분의 예쁜 웨딩 사진이 들어갑니다
        </div>

        <div class="content">
            <p>6년이 넘는 시간 동안<br>변함없이 서로의 곁을 지켜온 저희 두 사람이<br>이제 평생을 함께하려 합니다.</p>
            <p>바쁘시더라도 참석해 주셔서<br>저희의 앞날을 축복해 주시면<br>더없는 기쁨이 되겠습니다.</p>
        </div>

        <div class="date-location">
            <p>2026년 O월 O일 토요일 오후 1시</p>
            <p>OO 웨딩홀 OO층 OO홀</p>
        </div>
    </div>
</body>
</html>
